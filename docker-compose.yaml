# # run MULTIPLE containers together coz app needs more than one service:
                              # FastAPI server,   PostgreSQL database
# manage them together

services:
  app:
    build: .
    container_name: kipaji_app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL_ASYNC: ${DATABASE_URL_ASYNC}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      GROQ_API_KEY: ${GROQ_API_KEY}
      SCHEMA: ${SCHEMA:-kipaji}
    volumes:
      - ./static:/app/static      # for live updates during dev
      - ./scripts:/app/scripts
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:


# Docker Compose
#      │
#      ├── app container (FastAPI)
#      │
#      └── db container (PostgreSQL)